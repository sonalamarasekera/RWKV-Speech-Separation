version: '3.8'

services:

  # ── Training (GPU required) ───────────────────────────────────────────────────
  train:
    build:
      context: .
      dockerfile: Dockerfile   # <--- Points to the single file
      target: dev             # <--- Tells Docker to stop at the dev stage
    image: rwkv-ss:dev
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      python -m scripts.train
        --config configs/experiment/baseline_tf.yaml
    restart: "no"

  # ── Inference — CPU safe (works on any machine) ───────────────────────────────
  infer:
    build:
      context: .
      dockerfile: Dockerfile   # <--- Points to the single file
      target: production      # <--- Tells Docker to build the slim production stage
    image: rwkv-ss:prod
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    command: >
      python -m scripts.infer
        --checkpoint checkpoints/best.pt
    restart: "no"

  # ── Inference — GPU accelerated ───────────────────────────────────────────────
  infer-gpu:
    extends:
      service: infer
    profiles: [gpu]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
